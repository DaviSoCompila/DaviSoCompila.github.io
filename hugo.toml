theme = 'PaperMod'
languageCode = 'pt-br'
title = 'SoCompila'

[params.homeInfoParams]
    Title = "Olá, eu sou o SoCompila! 👋"
    Content = "Bem-vindo ao meu canto na web."

[[params.socialIcons]]
    name = "github"
    url = "https://github.com/socompila"
[[params.socialIcons]]
    name = "rss"
    url = "/blog/index.xml" # RSS específico do blog

[params.profileMode]
