<style>
  .mermaid:not([data-processed="true"]) { 
    display: none; 
  }
</style>

<div class="mermaid">
  {{- .Inner -}}
</div>

{{ if not (.Page.Scratch.Get "mermaid_loaded") }}
  {{ .Page.Scratch.Set "mermaid_loaded" true }}
  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
    mermaid.initialize({ 
      startOnLoad: true,
      theme: 'neutral',
      securityLevel: 'loose'
    });
  </script>
{{ end }}
